[pytest]
# Configures pytest to discover standard test files and custom validation methods
python_files = test_*.py
python_classes = Test*
python_functions = test_* run_*

# Exclude virtual environments and build directories from recursive scans
norecursedirs = venv .git .pytest_cache frontend node_modules static

# Set console log levels during execution
log_cli = true
log_cli_level = INFO
log_cli_format = [%(asctime)s] [%(levelname)s] - %(message)s
